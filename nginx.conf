server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed assets under _expo/ are immutable — cache them aggressively.
    location /_expo/ {
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # SPA fallback: serve index.html for any unknown path so client-side routes
    # (e.g. /diagnostics, /settings, /history) resolve on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

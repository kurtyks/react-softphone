user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # --- Secure TLS policy (applies to any ssl server below) ---
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;

    # ---- HTTP server: the SPA under /app -----------------------------------
    # Served under /app (matches Expo experiments.baseUrl "/app") so it can sit behind
    # a reverse proxy alongside other, unrelated routes. Files live in
    # /usr/share/nginx/html/app, so a request for /app/_expo/... maps straight to disk.
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Convenience redirects when the container is hit directly.
        location = /     { return 302 /app/; }
        location = /app  { return 308 /app/; }

        # Content-hashed assets are immutable — cache them aggressively.
        location /app/_expo/ {
            add_header Cache-Control "public, immutable, max-age=31536000";
            try_files $uri =404;
        }

        # SPA fallback: unknown paths under /app resolve to the app's index.html so
        # client-side routes (/app/diagnostics, /app/settings, /app/history) work on
        # deep links and refreshes.
        location /app/ {
            try_files $uri $uri/ /app/index.html;
        }
    }

    # ---- HTTPS server (template) -------------------------------------------
    # nginx refuses to start with `listen 443 ssl` unless ssl_certificate/_key are set,
    # so the whole block is commented out by default. TLS is usually terminated by an
    # upstream reverse proxy; if you want this container to serve HTTPS directly,
    # uncomment the block and provide the certificate/key below. The secure
    # ssl_protocols / ssl_ciphers above apply here automatically.
    #server {
    #    listen 443 ssl;
    #    server_name _;
    #    root /usr/share/nginx/html;
    #
    #    # ssl_certificate      /etc/nginx/certs/fullchain.pem;
    #    # ssl_certificate_key  /etc/nginx/certs/privkey.pem;
    #
    #    location = /     { return 302 /app/; }
    #    location = /app  { return 308 /app/; }
    #
    #    location /app/_expo/ {
    #        add_header Cache-Control "public, immutable, max-age=31536000";
    #        try_files $uri =404;
    #    }
    #
    #    location /app/ {
    #        try_files $uri $uri/ /app/index.html;
    #    }
    #}
}
